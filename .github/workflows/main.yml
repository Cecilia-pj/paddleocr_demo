name: build apk

on:
  workflow_dispatch:

permissions: 
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.1

      # 4. 缓存 Gradle 依赖（加速构建）
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('&zwnj;**/*.gradle*', '**&zwnj;/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. 缓存 Android SDK（可选，进一步加速）
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            $ANDROID_HOME/licenses
          key: ${{ runner.os }}-android-${{ hashFiles('**/gradle-wrapper.properties') }}

      # 6. 授予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 7. 安装项目依赖（可选，提前检查依赖问题）
      - name: Install dependencies
        run: ./gradlew dependencies

      # 8. 运行单元测试
      - name: Run unit tests
        run: ./gradlew test

      # 9. 构建项目（生成 APK/AAB）
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 10. 运行仪器化测试（如配置了 Android 测试）
      # - name: Run instrumentation tests
      #   run: ./gradlew connectedCheck
      #   env:
      #     ANDROID_EMULATOR_FORCE_RESET: true

      # 11. 上传构建产物（支持多 APK 上传）
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
          retention-days: 7

      # 12. 可选：自动签名并发布到 GitHub Releases（需配置 Secrets）
      # - name: Sign and publish APK
      #   if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      #   run: |
      #     ./gradlew assembleRelease
      #     # 使用 jarsigner 或 apksigner 签名（需配置 KEYSTORE 等 Secrets）
      #   env:
      #     KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      # 13. 可选：上传到 Firebase App Distribution 或 Play Store
      # - name: Deploy to Firebase
      #   uses: wzieba/Firebase-Distribution-Github-Action@v1
      #   with:
      #     appId: ${{ secrets.FIREBASE_APP_ID }}
      #     token: ${{ secrets.FIREBASE_TOKEN }}
      #     groups: testers
      #     file: app/build/outputs/apk/release/app-release.apk
